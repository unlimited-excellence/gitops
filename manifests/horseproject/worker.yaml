apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbox-worker
  namespace: horseproject
  labels:
    app: outbox-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: outbox-worker
  template:
    metadata:
      labels:
        app: outbox-worker
    spec:
      containers:
        - name: worker
          image: likespro/horse-backend:latest
          command: ["python", "-m", "app.worker"]
          env:
            - name: PYTHONPATH
              value: "/app"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: horse-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: horse-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: horse-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: horse-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: horse-secret
                  key: DB_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: horse-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: horse-config
                  key: KAFKA_TOPIC
            - name: CODEFORCES_API_KEY
              valueFrom:
                secretKeyRef:
                  name: horse-secret
                  key: CODEFORCES_API_KEY
            - name: CODEFORCES_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: horse-secret
                  key: CODEFORCES_API_SECRET
            - name: INTERNAL_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: horse-config
                  key: INTERNAL_API_BASE_URL
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z db 5432; do echo waiting for postgres; sleep 2; done"]
        - name: wait-for-kafka
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done"]
