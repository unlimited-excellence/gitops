apiVersion: v1
kind: ConfigMap
metadata:
  name: horse-config
  namespace: horseproject
data:
  DB_HOST: "db"
  DB_PORT: "5432"
  DB_NAME: "horse_db"
  DB_USER: "horse_user"
  ENV_TYPE: "production"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_TOPIC: "domain_events"
  INITIAL_MINT_AMOUNT: "1000.0"
  SYSTEM_ESCROW_USER_ID: "SYSTEM_ESCROW_ACCOUNT"
  CORS_ALLOW_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173"
  INTERNAL_API_BASE_URL: "http://backend:8000/api/v1"
---
apiVersion: v1
kind: Secret
metadata:
  name: horse-secret
  namespace: horseproject
type: Opaque
data:
  # Values are base64 encoded
  # DB_PASSWORD: horse_password -> aG9yc2VfcGFzc3dvcmQ=
  DB_PASSWORD: aG9yc2VfcGFzc3dvcmQ=
  # CODEFORCES_API_KEY: change-me-api-key -> Y2hhbmdlLW1lLWFwaS1rZXk=
  CODEFORCES_API_KEY: Y2hhbmdlLW1lLWFwaS1rZXk=
  # CODEFORCES_API_SECRET: change-me-api-secret -> Y2hhbmdlLW1lLWFwaS1zZWNyZXQ=
  CODEFORCES_API_SECRET: Y2hhbmdlLW1lLWFwaS1zZWNyZXQ=
